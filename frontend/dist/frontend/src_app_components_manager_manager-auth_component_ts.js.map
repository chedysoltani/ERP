<div class="auth-page manager-theme">
  <div class="background-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div class="auth-container fade-in">
    <div class="auth-card glass-card">
      <!-- Header -->
      <div class="auth-header">
        <div class="logo-wrap">
          <div class="logo-icon">
            <i class="bi bi-briefcase"></i>
          </div>
          <span class="logo-text">SIT ERP</span>
        </div>
        <h1 class="auth-title">{{ isSignIn ? 'Accès Manager' : 'Créer un compte' }}</h1>
        <p class="auth-subtitle">Gestion stratégique & pilotage d'entreprise</p>
      </div>

      <!-- Alerts -->
      <div *ngIf="errorMessage" class="auth-alert error">
        <i class="bi bi-exclamation-circle"></i>
        <span>{{ errorMessage }}</span>
      </div>
      <div *ngIf="successMessage" class="auth-alert success">
        <i class="bi bi-check-circle"></i>
        <span>{{ successMessage }}</span>
      </div>

      <!-- Login Form -->
      <form *ngIf="isSignIn" class="auth-form" [formGroup]="loginForm" (ngSubmit)="onLogin()">
        <div class="input-group">
          <label>Email professionnel</label>
          <div class="input-field" [class.error]="loginControls['email'].invalid && loginControls['email'].touched">
            <i class="bi bi-envelope"></i>
            <input type="email" formControlName="email" placeholder="nom@entreprise.com">
          </div>
        </div>

        <div class="input-group">
          <label>Mot de passe</label>
          <div class="input-field" [class.error]="loginControls['password'].invalid && loginControls['password'].touched">
            <i class="bi bi-shield-lock"></i>
            <input type="password" formControlName="password" placeholder="••••••••">
          </div>
        </div>

        <button type="submit" class="btn-premium btn-primary w-full" [disabled]="loading || loginForm.invalid">
          <span *ngIf="!loading">Se connecter</span>
          <span *ngIf="loading" class="spinner"></span>
          <i *ngIf="!loading" class="bi bi-arrow-right"></i>
        </button>
      </form>

      <!-- Register Form -->
      <form *ngIf="!isSignIn" class="auth-form" [formGroup]="registerForm" (ngSubmit)="onRegister()">
        <div class="form-grid">
          <div class="input-group">
            <label>Nom</label>
            <div class="input-field" [class.error]="registerControls['nom'].invalid && registerControls['nom'].touched">
              <input type="text" formControlName="nom" placeholder="Nom">
            </div>
          </div>
          <div class="input-group">
            <label>Prénom</label>
            <div class="input-field" [class.error]="registerControls['prenom'].invalid && registerControls['prenom'].touched">
              <input type="text" formControlName="prenom" placeholder="Prénom">
            </div>
          </div>
        </div>

        <div class="input-group">
          <label>Email professionnel</label>
          <div class="input-field" [class.error]="registerControls['email'].invalid && registerControls['email'].touched">
            <input type="email" formControlName="email" placeholder="manager@sit.ma">
          </div>
        </div>

        <div class="input-group">
          <label>Mot de passe</label>
          <div class="input-field" [class.error]="registerControls['password'].invalid && registerControls['password'].touched">
            <input type="password" formControlName="password" placeholder="••••••••">
          </div>
        </div>

        <button type="submit" class="btn-premium btn-primary w-full" [disabled]="loading || registerForm.invalid">
          <span *ngIf="!loading">Créer mon espace</span>
          <span *ngIf="loading" class="spinner"></span>
        </button>
      </form>

      <div class="auth-footer">
        {{ isSignIn ? "Pas encore de compte ?" : "Déjà membre ?" }}
        <button (click)="toggleMode()">{{ isSignIn ? 'S\'inscrire' : 'Se connecter' }}</button>
      </div>
    </div>

    <div class="back-link">
      <a href="/"><i class="bi bi-arrow-left"></i> Retour à l'accueil</a>
    </div>
  </div>
</div>
