<div class="admin-login-page">
  <!-- Animated background -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="login-container">
    <!-- Logo & Brand -->
    <div class="brand-section">
      <div class="brand-logo">
        <i class="bi bi-shield-fill-check"></i>
      </div>
      <h1 class="brand-title">SIT <span class="gradient-text">ERP</span></h1>
      <p class="brand-subtitle">Portail Administrateur</p>
    </div>

    <!-- Login Card -->
    <div class="login-card glass-card">
      <div class="card-header-section">
        <h2>Connexion Admin</h2>
        <p>Accès réservé aux administrateurs système</p>
      </div>

      <form (ngSubmit)="login()" #loginForm="ngForm" class="login-form" autocomplete="off">
        <!-- Error alert -->
        <div class="alert-error" *ngIf="error">
          <i class="bi bi-exclamation-triangle-fill"></i>
          {{ error }}
        </div>

        <!-- Email -->
        <div class="field-group">
          <label class="field-label">Adresse email</label>
          <div class="field-input-wrap">
            <i class="bi bi-envelope field-icon"></i>
            <input
              type="email"
              class="field-input"
              [(ngModel)]="email"
              name="email"
              placeholder="admin@entreprise.com"
              autocomplete="username"
              required
            />
          </div>
        </div>

        <!-- Password -->
        <div class="field-group">
          <label class="field-label">Mot de passe</label>
          <div class="field-input-wrap">
            <i class="bi bi-lock field-icon"></i>
            <input
              [type]="showPassword ? 'text' : 'password'"
              class="field-input"
              [(ngModel)]="password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
            <button type="button" class="toggle-pw" (click)="showPassword = !showPassword">
              <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-login" [disabled]="loading">
          <span *ngIf="!loading">
            <i class="bi bi-shield-lock me-2"></i>Accéder au panneau
          </span>
          <span *ngIf="loading" class="loading-spin">
            <i class="bi bi-arrow-clockwise spin-icon"></i> Authentification...
          </span>
        </button>
      </form>

      <div class="card-footer-note">
        <i class="bi bi-shield-fill-exclamation"></i>
        Accès sécurisé — activité journalisée
      </div>
    </div>

    <!-- Back link -->
    <a routerLink="/landing" class="back-link">
      <i class="bi bi-arrow-left"></i> Retour à l'accueil
    </a>
  </div>
</div>
